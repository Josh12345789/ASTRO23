<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRO23 | OFFICIAL PORTAL</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syncopate:wght@400;700&family=Inter:wght@300;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-purple: #8a2be2;
            --bg-dark: #000505;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- IMMERSIVE BACKGROUND --- */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(rgba(0,5,5,0.75), rgba(0,5,5,0.75)), url('./photo2.jpg');
            background-size: cover;
            background-position: center;
            filter: contrast(1.1) brightness(0.8);
        }

        /* --- THE LOGO --- */
        .brand-logo {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 100;
        }
        .brand-logo img {
            height: 80px; 
            filter: drop-shadow(0 0 10px rgba(138, 43, 226, 0.5));
        }

        /* --- MAIN CONTENT --- */
        .main-portal {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 10%;
            box-sizing: border-box;
        }

        .welcome-header {
            /* Applied Bebas Neue here */
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 400;
            letter-spacing: 8px;
            margin: 0;
            line-height: 0.85;
            background: linear-gradient(to bottom, #ffffff 50%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .tagline {
            font-size: 0.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent-purple);
            margin-top: 10px;
            font-weight: 900;
        }

        /* --- NAVIGATION GRID --- */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 50px;
            max-width: 1100px;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 35px;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 140px;
            position: relative;
            overflow: hidden;
        }

        .nav-card:hover {
            background: rgba(138, 43, 226, 0.2);
            transform: translateY(-5px);
            border-color: var(--accent-purple);
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.3);
        }

        .nav-card span {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 3px;
            z-index: 2;
        }

        .nav-card small {
            font-size: 0.65rem;
            letter-spacing: 3px;
            margin-top: 12px;
            opacity: 0.7;
            text-transform: uppercase;
            font-weight: 900;
            z-index: 2;
        }

        /* --- FOOTER ELEMENTS --- */
        .contact-footer {
            margin-top: 60px;
            display: flex;
            gap: 30px;
        }

        .email-link {
            color: white;
            text-decoration: none;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 3px;
            opacity: 0.4;
            transition: 0.3s;
        }

        .email-link:hover {
            opacity: 1;
            color: var(--accent-purple);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .brand-logo { top: 20px; left: 20px; }
            .brand-logo img { height: 60px; }
            .main-portal { padding: 100px 5% 40px 5%; justify-content: flex-start; }
            .welcome-header { font-size: 5rem; }
            .nav-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="brand-logo">
        <img src="LO.jpg" alt="ASTRO23 Logo">
    </div>

    <main class="main-portal">
        <h1 class="welcome-header">ASTRO23</h1>
        <div class="tagline">PRE-ORDER & DIRECT PURCHASE PORTAL</div>

        <div class="nav-grid">
            <a href="croc.html" class="nav-card">
                <span>CROCS</span>
                <small>Classic Heritage</small>
            </a>
            
            <a href="windbreaker.html" class="nav-card">
                <span>WINDBREAKERS</span>
                <small>Tech Performance</small>
            </a>

            <a href="BapeCrocs.html" class="nav-card">
                <span>BAPE CROCS</span>
                <small>Limited Collab</small>
            </a>

            <a href="tracksuits.html" class="nav-card">
                <span>TRACKSUITS</span>
                <small>Street Uniform</small>
            </a>

            <a href="nike.html" class="nav-card">
                <span>NIKE</span>
                <small>Global Athletics</small>
            </a>

            <a href="minus.html" class="nav-card">
                <span>MINUS</span>
                <small>Underground Drop</small>
            </a>
        </div>

        <div class="contact-footer">
            <a href="mailto:kachesajoshua11@gmail.com" class="email-link">ESTABLISHED 2026 // CONTACT SUPPORT</a>
        </div>
    </main>

</body>
</html>
