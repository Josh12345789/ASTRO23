<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-SHIRT DROPS</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0b0b0b;
        color: white;
        font-family: 'Inter', sans-serif;
    }

    .topbar {
        display: flex;
        justify-content: space-between;
        padding: 20px 40px;
        font-size: 12px;
        letter-spacing: 2px;
        opacity: 0.6;
        text-transform: uppercase;
    }

    h1 {
        text-align: center;
        font-family: 'Anton', sans-serif;
        font-size: 60px;
        letter-spacing: 5px;
        margin-top: 30px;
    }

    .info {
        text-align: center;
        margin-top: 10px;
        font-size: 14px;
        opacity: 0.7;
    }

    .price-note {
        text-align: center;
        margin-top: 5px;
        color: crimson;
        letter-spacing: 1px;
        font-weight: 600;
    }

    .cta {
        display: block;
        text-align: center;
        margin: 25px auto;
        padding: 10px 20px;
        width: fit-content;
        border: 1px solid white;
        color: white;
        text-decoration: none;
        letter-spacing: 2px;
        font-size: 12px;
        transition: 0.3s;
    }

    .cta:hover {
        background: white;
        color: black;
    }

    .section {
        padding: 40px;
    }

    .section h2 {
        font-family: 'Anton', sans-serif;
        font-size: 28px;
        letter-spacing: 3px;
        margin-bottom: 5px;
    }

    .section p {
        font-size: 12px;
        opacity: 0.6;
        margin-bottom: 20px;
        letter-spacing: 2px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
    }

    .grid img {
        width: 100%;
        filter: grayscale(100%);
        border: 1px solid rgba(255,255,255,0.1);
        transition: 0.3s ease;
    }

    .grid img:hover {
        filter: grayscale(0%);
        transform: scale(1.03);
    }

    .footer {
        text-align: center;
        padding: 40px;
        font-size: 11px;
        opacity: 0.4;
        letter-spacing: 2px;
    }
</style>

</head>

<body>
