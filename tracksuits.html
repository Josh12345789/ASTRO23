<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRACKSUITS | Cosmic Hero Drop</title>

<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/jpg" href="astrofav.jpg">
<style>
:root{
--space-bg:#0a061a;
--orbit-purple:#5c2ec7;
--ring-gold:#ffcc00;
--neon-pink:#ec7bca;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--space-bg);
color:#fff;
font-family:'Space Grotesk',sans-serif;
overflow-x:hidden;
min-height:100vh;
}

/* SATURN */
.saturn-container{
position:fixed;
top:10%;
left:-50px;
width:300px;
height:300px;
z-index:-1;
transform:rotate(-15deg);
opacity:.6;
}

.saturn-body{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:100px;
height:100px;
border-radius:50%;
background:linear-gradient(135deg,#a388cc 0%,#140b2e 100%);
}

.saturn-rings{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(75deg) scaleX(.2);
width:350px;
height:350px;
border:12px solid rgba(255,204,0,.6);
border-radius:50%;
animation:ringpulse 8s infinite alternate ease-in-out;
}

@keyframes ringpulse{
from{transform:translate(-50%,-50%) rotate(75deg) scaleX(.18);opacity:.4;}
to{transform:translate(-50%,-50%) rotate(80deg) scaleX(.25);opacity:.8;}
}

/* CONTENT */
.container{
max-width:900px;
margin:auto;
padding:60px 20px;
text-align:center;
}

h1{
font-size:clamp(3rem,10vw,6rem);
text-transform:uppercase;
letter-spacing:-4px;
line-height:.85;
background:linear-gradient(to bottom,#fff,#666);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero-image-wrapper{
margin:40px auto;
max-width:750px;
}

.main-img{
width:100%;
border-radius:24px;
box-shadow:0 0 100px rgba(92,46,199,.3);
}

.info-panel{
background:rgba(255,255,255,.02);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.05);
padding:45px 28px;
border-radius:32px;
margin-top:-60px;
position:relative;
z-index:5;
max-width:620px;
margin-left:auto;
margin-right:auto;
}

.marker-desc{
font-family:'Permanent Marker',cursive;
font-size:clamp(1.2rem,4vw,1.8rem);
color:var(--neon-pink);
display:block;
margin-bottom:25px;
}

.price-row{
display:flex;
justify-content:center;
margin-bottom:25px;
}

.price-box{
background:#fff;
color:#000;
padding:10px 30px;
font-weight:800;
font-size:2rem;
border-radius:12px;
transform:skewX(-10deg);
}

/* DISCOUNT BOX */
.discount-box{
margin:0 auto 28px;
max-width:420px;
padding:20px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
}

.discount-title{
font-size:.75rem;
letter-spacing:3px;
margin-bottom:14px;
text-transform:uppercase;
}

.discount-box input{
width:100%;
padding:14px;
background:#111;
border:1px solid rgba(255,255,255,.08);
color:#fff;
text-align:center;
outline:none;
border-radius:12px;
margin-bottom:12px;
}

.discount-box button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:var(--orbit-purple);
color:#fff;
font-weight:700;
letter-spacing:2px;
cursor:pointer;
transition:.3s;
}

.discount-box button:hover{
background:#fff;
color:#000;
}

#discountResult{
display:none;
margin-top:14px;
padding:15px;
border-radius:14px;
background:rgba(92,46,199,.15);
}

.old-price{
text-decoration:line-through;
opacity:.5;
font-size:14px;
}

.new-price{
font-size:2rem;
font-weight:700;
margin-top:6px;
color:#fff;
}

.rules{
font-size:.72rem;
opacity:.7;
letter-spacing:2px;
margin-top:8px;
}

.cta-btn{
display:block;
background:var(--orbit-purple);
color:#fff;
text-decoration:none;
padding:22px;
border-radius:16px;
font-weight:700;
text-transform:uppercase;
letter-spacing:2px;
transition:.3s;
border:1px solid rgba(255,255,255,.2);
}

.cta-btn:hover{
background:#fff;
color:#000;
box-shadow:0 0 30px var(--neon-pink);
}
</style>
</head>

<body>

<div class="saturn-container">
<div class="saturn-body"></div>
<div class="saturn-rings"></div>
</div>

<div class="container">

<h1>TRACKSUIT<br>COLLECTION</h1>

<div class="hero-image-wrapper">
<img src="tracksuits.jpg" alt="Collection Preview" class="main-img">
</div>

<div class="info-panel">

<span class="marker-desc">EACH TRACKSUIT GOING AT K650, PREORDERS ONLY.</span>

<div class="price-row">
<div class="price-box">K700</div>
</div>

<!-- DISCOUNT -->
<div class="discount-box">

<div class="discount-title">ENTER DISCOUNT CODE</div>

<input type="text" id="code" placeholder="Enter Code">

<button onclick="applyDiscount()">APPLY CODE</button>

<div id="discountResult">
<div class="old-price">Original Price: K650</div>
<div class="new-price">Discount Price: K585</div>
<div class="rules">DISCOUNT RULES: 10% OFF APPLIED</div>
</div>

</div>

<a href="https://wa.me/qr/JHU7JLO4QDFBD1" class="cta-btn">Secure Your Fit Now</a>

</div>
</div>

<script>
function applyDiscount(){

let code = document.getElementById("code").value.trim().toUpperCase();

let validCodes = ["PLANET10","DROP10","TRACK10","VIP10","FIRST10"];

if(validCodes.includes(code)){
document.getElementById("discountResult").style.display = "block";
}else{
alert("Invalid Discount Code");
}

}
</script>

</body>
</html>
