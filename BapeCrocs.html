<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAPE | DUAL PRICING</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/jpg" href="astrofav.jpg">

<style>
:root{
--bape-purple:#8a2be2;
--bg-black:#080808;
--glass:rgba(255,255,255,0.05);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg-black);
color:#fff;
font-family:'Inter',sans-serif;
padding:40px 20px;
display:flex;
justify-content:center;
}

.product-card{
max-width:720px;
width:100%;
background:#000;
border:1px solid var(--glass);
border-radius:45px;
padding:60px 35px;
text-align:center;
box-shadow:0 40px 90px rgba(0,0,0,.9);
}

h1{
font-family:'Syncopate',sans-serif;
font-size:clamp(2rem,8vw,4rem);
letter-spacing:8px;
margin-bottom:35px;
text-transform:uppercase;
}

.product-img{
width:100%;
max-width:500px;
border-radius:28px;
box-shadow:0 0 40px rgba(138,43,226,.18);
margin-bottom:45px;
}

.price-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-bottom:35px;
}

.price-box{
background:var(--glass);
padding:28px 20px;
border-radius:25px;
border:1px solid rgba(255,255,255,.08);
}

.label{
display:block;
font-family:'Syncopate',sans-serif;
font-size:.65rem;
letter-spacing:3px;
color:var(--bape-purple);
margin-bottom:12px;
}

.value{
display:block;
font-family:'Syncopate',sans-serif;
font-size:2rem;
font-weight:700;
}

.discount-box{
margin-top:10px;
padding:25px;
border-radius:28px;
background:#0b0b0b;
border:1px solid rgba(255,255,255,.08);
}

.discount-title{
font-family:'Syncopate',sans-serif;
font-size:.7rem;
letter-spacing:3px;
margin-bottom:16px;
}

.discount-box input{
width:100%;
padding:14px;
background:#111;
border:1px solid rgba(255,255,255,.08);
color:#fff;
border-radius:14px;
text-align:center;
margin-bottom:14px;
outline:none;
}

.discount-box button{
width:100%;
padding:14px;
border:none;
border-radius:40px;
background:#fff;
color:#000;
font-family:'Syncopate',sans-serif;
font-size:.7rem;
letter-spacing:2px;
cursor:pointer;
transition:.3s;
}

.discount-box button:hover{
background:var(--bape-purple);
color:#fff;
}

#discountResult{
display:none;
margin-top:18px;
padding:18px;
border-radius:20px;
background:rgba(138,43,226,.08);
border:1px solid rgba(138,43,226,.3);
}

.old-price{
text-decoration:line-through;
opacity:.5;
font-size:14px;
}

.new-price{
font-family:'Syncopate',sans-serif;
font-size:1.7rem;
margin-top:8px;
color:var(--bape-purple);
}

.rules{
font-size:.72rem;
opacity:.6;
letter-spacing:2px;
margin-top:8px;
}

.main-btn{
display:block;
margin:28px auto 12px;
max-width:400px;
text-decoration:none;
padding:20px;
border-radius:100px;
background:#fff;
color:#000;
font-family:'Syncopate',sans-serif;
font-size:.8rem;
letter-spacing:2px;
transition:.3s;
}

.main-btn:hover{
background:var(--bape-purple);
color:#fff;
}

.note{
font-size:.7rem;
opacity:.4;
letter-spacing:2px;
}

@media(max-width:600px){
.price-grid{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="product-card">

<h1>BAPE CROCS</h1>

<img src="Bcrocs.jpg" alt="Bape Crocs" class="product-img">

<div class="price-grid">

<div class="price-box">
<span class="label">PRE-ORDER</span>
<span class="value">K220</span>
</div>

<div class="price-box">
<span class="label">RETAIL</span>
<span class="value">K550</span>
</div>

</div>

<div class="discount-box">

<div class="discount-title">ENTER DISCOUNT CODE</div>

<input type="text" id="code" placeholder="Enter Code">

<button onclick="applyDiscount()">APPLY CODE</button>

<div id="discountResult">
<div class="old-price">Retail Price: K550</div>
<div class="new-price">Discount Price: K495</div>
<div class="rules">DISCOUNT RULES: 10% OFF APPLIED</div>
</div>

</div>

<a href="https://wa.me/qr/JHU7JLO4QDFBD1" class="main-btn">INQUIRE ON WHATSAPP</a>

<p class="note">AUTHENTIC QUALITY GUARANTEED</p>

</div>

<script>
function applyDiscount(){

let code = document.getElementById("code").value.trim().toUpperCase();

let validCodes = ["PLANET10","FIRST10","DROP10","TRACK10","VIP10"];

let usedCodes = JSON.parse(localStorage.getItem("usedCodesBape")) || [];

if(validCodes.includes(code)){

if(usedCodes.includes(code)){
alert("This discount code has already been used.");
return;
}

document.getElementById("discountResult").style.display = "block";

usedCodes.push(code);
localStorage.setItem("usedCodesBape", JSON.stringify(usedCodes));

}else{
alert("Invalid Discount Code");
}

}
</script>

</body>
</html>
