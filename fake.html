<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAPE | DUAL PRICING</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bape-purple: #8a2be2;
            --bg-black: #080808;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-black);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .product-card {
            max-width: 700px;
            width: 100%;
            background: #000;
            border: 1px solid var(--glass);
            border-radius: 50px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: clamp(2rem, 8vw, 4rem);
            letter-spacing: 10px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .img-container {
            width: 100%;
            margin-bottom: 50px;
        }

        .product-img {
            width: 100%;
            max-width: 500px;
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.15);
        }

        /* --- TWO PRICE LAYOUT --- */
        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 50px;
        }

        .price-box {
            background: var(--glass);
            padding: 30px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .price-box:hover {
            border-color: var(--bape-purple);
            background: rgba(138, 43, 226, 0.05);
        }

        .label {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--bape-purple);
            display: block;
            margin-bottom: 15px;
        }

        .value {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            display: block;
        }

        /* --- CTA SECTION --- */
        .cta-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .main-btn {
            width: 100%;
            max-width: 400px;
            background: #fff;
            color: #000;
            text-decoration: none;
            padding: 22px;
            border-radius: 100px;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .main-btn:hover {
            background: var(--bape-purple);
            color: white;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
        }

        @media (max-width: 600px) {
            .price-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="product-card">
        <h1>BAPE CROCS</h1>

        <div class="img-container">
            <img src="Bcrocs.jpg" alt="Bape Crocs" class="product-img">
        </div>

        <div class="price-grid">
            <div class="price-box">
                <span class="label">PRE-ORDER</span>
                <span class="value">K220</span>
            </div>
            <div class="price-box">
                <span class="label">RETAIL</span>
                <span class="value">K550</span>
            </div>
        </div>

        <div class="cta-container">
            <a href="https://wa.me/qr/QQAG6XSQE3UVB1" class="main-btn">INQUIRE ON WHATSAPP</a>
            <p style="font-size: 0.7rem; opacity: 0.4; letter-spacing: 2px;">AUTHENTIC QUALITY GUARANTEED</p>
        </div>
    </div>

</body>
</html>
