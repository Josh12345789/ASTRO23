<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTEIZ | LUSAKA DROP</title>
    <link rel="icon" type="image/jpg" href="astrofav.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Bebas+Neue&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-purple: #5c2c6d;
            --rtw-red: #ff3e3e;
            --deep-black: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--deep-black);
            color: #fff;
            font-family: 'Bebas Neue', sans-serif;
            overflow-x: hidden;
            height: 100%;
        }

        /* --- NEW SCROLLING TEXT BACKGROUND --- */
        .bg-text-wrap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            pointer-events: none;
            opacity: 0.1; /* Subtle white text texture */
        }

        .bg-row {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 12vw;
            line-height: 1;
            white-space: nowrap;
            letter-spacing: -5px;
            color: #fff;
        }

        .bg-row:nth-child(even) {
            text-align: right;
            color: transparent;
            -webkit-text-stroke: 1px #fff; /* Outlined text for variety */
        }

        /* --- ASYMMETRIC LAYOUT --- */
        .content-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: row;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 50px;
            gap: 40px;
        }

        .image-side {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        .image-side img {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.2);
            filter: grayscale(20%);
            box-shadow: 30px 30px 0px var(--accent-purple); /* Brutalist offset shadow */
        }

        .info-side {
            flex: 1;
            max-width: 400px;
            text-align: left;
        }

        .brand-header {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 10px;
            color: var(--accent-purple);
            margin-bottom: 10px;
            display: block;
        }

        h2 {
            font-size: 4rem;
            margin: 0;
            line-height: 0.9;
            text-transform: uppercase;
        }

        .price-tag {
            font-size: 3rem;
            color: var(--rtw-red);
            margin: 20px 0;
            display: block;
        }

        .desc {
            font-family: sans-serif;
            font-size: 0.8rem;
            line-height: 1.6;
            color: #aaa;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .buy-button {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 20px 40px;
            text-decoration: none;
            font-size: 1.5rem;
            transition: 0.4s;
        }

        .buy-button:hover {
            background: var(--accent-purple);
            color: #fff;
            padding-right: 60px;
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 900px) {
            .content-wrapper {
                flex-direction: column;
                padding: 20px;
                text-align: center;
            }
            .info-side {
                text-align: center;
            }
            .image-side {
                max-width: 100%;
            }
            h2 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="bg-text-wrap">
        <div class="bg-row">CORTEIZ CORTEIZ CORTEIZ</div>
        <div class="bg-row">CORTEIZ CORTEIZ CORTEIZ</div>
        <div class="bg-row">CORTEIZ CORTEIZ CORTEIZ</div>
        <div class="bg-row">CORTEIZ CORTEIZ CORTEIZ</div>
        <div class="bg-row">CORTEIZ CORTEIZ CORTEIZ</div>
    </div>

    <div class="content-wrapper">
        <div class="image-side">
            <img src="T.jpg" alt="Corteiz Windbreaker">
        </div>

        <div class="info-side">
            <span class="brand-header">RTW LUSAKA</span>
            <h2>Windbreaker<br>Archive 01</h2>
            <span class="price-tag">K750</span>
            
            <p class="desc">
                High-performance shell. Water resistant. 
                Designed for the streets of Lusaka. 
                Limited pre-order allocation.
            </p>

            <a href="https://wa.me/qr/JHU7JLO4QDFBD1" class="buy-button">SECURE PIECE</a>
        </div>
    </div>

</body>
</html>
