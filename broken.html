<style>
:root{
    --space-bg:#030303;
    --planet-green:#a2ff00;
    --off-white:#e0e0e0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background-color:var(--space-bg);
    background-image:
    radial-gradient(circle at 10% 20%, rgba(162,255,0,0.08) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(255,255,255,0.05) 0%, transparent 40%);
    background-attachment:fixed;
    color:var(--off-white);
    font-family:'Space Grotesk',sans-serif;
    text-align:center;
    overflow-x:hidden;
}

/* LOGO */
nav{
    padding:100px 20px 20px;
    display:flex;
    justify-content:center;
}

.glitch-logo{
    font-family:'Archivo Black',sans-serif;
    font-size:clamp(3rem,12vw,8rem);
    color:var(--planet-green);
    text-transform:uppercase;
    letter-spacing:-5px;
    position:relative;
    animation:warpDrive 10s ease-in-out infinite;
}

.glitch-logo::before,
.glitch-logo::after{
    content:"BROKEN PLANET";
    position:absolute;
    inset:0;
    opacity:.8;
}

.glitch-logo::before{
    color:#0ff;
    z-index:-1;
    animation:glitchEffect 3s infinite;
}

.glitch-logo::after{
    color:#f0f;
    z-index:-2;
    animation:glitchEffect 3s infinite 1.5s;
}

/* PRICE BANNER */
.price-banner{
    max-width:900px;
    margin:10px auto 35px;
    padding:18px 25px;
    border:1px solid rgba(162,255,0,.25);
    background:rgba(162,255,0,.06);
    color:var(--planet-green);
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:3px;
    font-size:clamp(.9rem,2vw,1.2rem);
    box-shadow:0 0 25px rgba(162,255,0,.08);
    animation:pulseGlow 2s infinite alternate;
}

/* ACTION */
.top-action{
    margin-bottom:40px;
}

.order-btn{
    display:inline-block;
    background:var(--planet-green);
    color:#000;
    text-decoration:none;
    font-family:'Archivo Black',sans-serif;
    padding:22px 70px;
    font-size:1.2rem;
    text-transform:uppercase;
    clip-path:polygon(10% 0%,100% 0%,90% 100%,0% 100%);
    transition:.3s;
}

.order-btn:hover{
    background:#fff;
    transform:scale(1.05);
}

.supplier-contact{
    font-size:.7rem;
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--planet-green);
    margin-top:20px;
    font-weight:900;
    opacity:.8;
}

.supplier-link{
    color:#fff;
    text-decoration:underline;
}

/* GRID */
.broken-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
    max-width:1400px;
    margin:40px auto;
    padding:0 20px;
}

.broken-card{
    background:#090909;
    overflow:hidden;
    opacity:0;
    transform:translateY(30px);
    animation:cardRevealUp .6s forwards;
}

.broken-card:nth-child(1){animation-delay:.1s;}
.broken-card:nth-child(2){animation-delay:.15s;}
.broken-card:nth-child(3){animation-delay:.2s;}
.broken-card:nth-child(4){animation-delay:.25s;}
.broken-card:nth-child(5){animation-delay:.3s;}
.broken-card:nth-child(6){animation-delay:.35s;}

.broken-card img{
    width:100%;
    display:block;
    transition:.6s ease;
}

.broken-card:hover img{
    transform:scale(1.1);
}

/* ANIMATIONS */
@keyframes glitchEffect{
    0%{clip:rect(10px,9999px,60px,0);transform:translate(0);}
    5%{clip:rect(40px,9999px,10px,0);transform:translate(-2px,2px);}
    100%{clip:rect(10px,9999px,60px,0);transform:translate(0);}
}

@keyframes cardRevealUp{
    to{opacity:1;transform:translateY(0);}
}

@keyframes warpDrive{
    0%,100%{transform:skew(0deg);}
    50%{transform:skew(1deg,.5deg);}
}

@keyframes pulseGlow{
    from{box-shadow:0 0 10px rgba(162,255,0,.05);}
    to{box-shadow:0 0 35px rgba(162,255,0,.2);}
}

@media(max-width:768px){
    .broken-grid{
        grid-template-columns:1fr 1fr;
        gap:8px;
    }

    .glitch-logo{
        font-size:3.5rem;
    }

    .order-btn{
        padding:18px 45px;
        font-size:1rem;
    }
}
</style>
