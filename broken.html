<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BROKEN PLANET | COSMIC DROP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@300;700;900&display=swap" rel="stylesheet">

<style>
:root{
--space-bg:#030303;
--planet-green:#a2ff00;
--off-white:#e0e0e0;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#030303;
color:var(--off-white);
font-family:'Space Grotesk',sans-serif;
text-align:center;
overflow-x:hidden;
}

nav{
padding:90px 20px 20px;
}

.glitch-logo{
font-family:'Archivo Black',sans-serif;
font-size:clamp(3rem,11vw,8rem);
color:var(--planet-green);
letter-spacing:-4px;
text-transform:uppercase;
}

.price-banner{
max-width:950px;
margin:15px auto 30px;
padding:18px;
border:1px solid rgba(162,255,0,.25);
background:rgba(162,255,0,.06);
color:var(--planet-green);
font-weight:900;
letter-spacing:3px;
text-transform:uppercase;
}

.discount-box{
max-width:520px;
margin:20px auto 50px;
padding:25px;
background:#0b0b0b;
border:1px solid rgba(255,255,255,.08);
}

.discount-title{
font-size:14px;
font-weight:900;
letter-spacing:3px;
margin-bottom:18px;
text-transform:uppercase;
}

.discount-box input{
width:100%;
padding:14px;
background:#111;
border:1px solid rgba(255,255,255,.1);
color:#fff;
text-align:center;
margin-bottom:15px;
outline:none;
}

.discount-box button{
width:100%;
padding:14px;
background:var(--planet-green);
border:none;
font-weight:900;
cursor:pointer;
text-transform:uppercase;
}

.discount-box button:hover{
opacity:.9;
}

#result{
display:none;
margin-top:18px;
padding:18px;
background:#111;
}

.old-price{
text-decoration:line-through;
opacity:.5;
}

.new-price{
font-size:34px;
font-weight:900;
color:var(--planet-green);
margin-top:8px;
}

.rule{
font-size:12px;
opacity:.7;
letter-spacing:2px;
margin-top:8px;
text-transform:uppercase;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:14px;
max-width:1400px;
margin:auto;
padding:0 20px 60px;
}

.gallery img{
width:100%;
display:block;
filter:grayscale(100%);
transition:.4s;
}

.gallery img:hover{
filter:grayscale(0%);
transform:scale(1.03);
}
</style>
</head>

<body>

<nav>
<h1 class="glitch-logo">BROKEN PLANET</h1>
</nav>

<div class="price-banner">
BROKEN PLANET TRACKSUITS GOING AT K750
</div>

<div class="discount-box">

<div class="discount-title">
Enter Discount Code
</div>

<input type="text" id="code" placeholder="ENTER CODE">

<button onclick="applyDiscount()">Apply Code</button>

<div id="result">
<div class="old-price">Original Price: K750</div>
<div class="new-price">Discount Price: K675</div>
<div class="rule">DISCOUNT RULES: 10% OFF APPLIED</div>
</div>

</div>

<!-- ALL IMAGES FROM BEFORE -->
<div class="gallery">
<img src="a.jpg">
<img src="b.jpg">
<img src="c.jpg">
<img src="e.jpg">
<img src="i.jpg">
<img src="m.jpg">
<img src="n.jpg">
<img src="o.jpg">
<img src="p.jpg">
<img src="q.jpg">
<img src="r.jpg">
<img src="t.jpg">
<img src="u.jpg">
<img src="v.jpg">
<img src="w.jpg">
<img src="x.jpg">
<img src="y.jpg">
<img src="z.jpg">
</div>

<script>
function applyDiscount(){

let code = document.getElementById("code").value.trim().toUpperCase();

let validCodes = ["PLANET10","DROP10","TRACK10","VIP10","FIRST10"];

if(validCodes.includes(code)){
document.getElementById("result").style.display = "block";
}else{
alert("Invalid Discount Code");
}

}
</script>

</body>
</html>
