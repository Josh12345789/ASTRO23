<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Crocs Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpg" href="astrofav.jpg">
    <style>
        :root {
            --accent-purple: #5c2ec7;
            --soft-white: #f4f4f9;
        }

        body {
            background-color: #000;
            color: var(--soft-white);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .product-display {
            background: #111;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        .product-display img {
            width: 100%;
            border-radius: 16px;
            display: block;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 20px 0;
            letter-spacing: -1px;
            color: var(--soft-white);
        }

        /* The Price Grid - Showing both clearly */
        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .price-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 18px;
            border: 1px solid #333;
        }

        .price-card.featured {
            border-color: var(--accent-purple);
            background: rgba(92, 46, 199, 0.1);
        }

        .label {
            display: block;
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .amount {
            font-size: 1.5rem;
            font-weight: 800;
            display: block;
        }

        .pre-order-color { color: #00ff88; } /* Fresh green for pre-order */
        .retail-color { color: #ffffff; }    /* Clean white for retail */

        .instruction-text {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .cta-link {
            display: block;
            background: var(--accent-purple);
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s ease;
        }

        .cta-link:hover {
            transform: scale(1.02);
            background: #713be6;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="product-display">
            <img src="crocs.jpg" alt="Classic Crocs">
            <h1>CLASSIC CROCS</h1>
        </div>

        <div class="price-grid">
            <div class="price-card featured">
                <span class="label">Pre-Order</span>
                <span class="amount pre-order-color">K160</span>
            </div>
            <div class="price-card">
                <span class="label">In-Stock Retail</span>
                <span class="amount retail-color">K300</span>
            </div>
        </div>

        <p class="instruction-text">
            Choose your preferred option and contact the supplier below to finalize your order.
        </p>

        <a href="https://wa.me/qr/JHU7JLO4QDFBD1" class="cta-link">Contact Supplier</a>
    </div>

</body>
</html>
