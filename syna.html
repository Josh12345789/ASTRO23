<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNA WORLD | HYPER DROP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/jpg" href="astrofav.jpg">

<style>
:root{
--blue:#0033ff;
--red:#ff0044;
--white:#f5f5f0;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:var(--white);
font-family:'Inter',sans-serif;
text-align:center;
overflow-x:hidden;
}

.live-alert{
position:fixed;
top:0;
left:0;
width:100%;
padding:14px;
background:var(--blue);
font-weight:900;
letter-spacing:2px;
font-size:.8rem;
z-index:99;
}

nav{
padding:140px 20px 50px;
}

.logo{
font-family:'Orbitron',sans-serif;
font-size:7rem;
font-weight:900;
letter-spacing:8px;
color:#fff;
text-shadow:0 0 10px #fff,0 0 25px var(--blue),0 0 45px var(--red);
}

.logo span{
color:var(--red);
}

.tagline{
margin-top:10px;
opacity:.7;
letter-spacing:4px;
font-weight:900;
}

.price-box{
display:inline-block;
margin-top:40px;
padding:24px 42px;
border:2px solid var(--red);
background:rgba(255,0,68,.08);
}

.price-box h1{
font-size:3rem;
color:var(--red);
}

.price-box p{
margin-top:10px;
letter-spacing:2px;
font-weight:900;
}

.btn{
display:inline-block;
margin:35px 0 25px;
padding:20px 55px;
background:var(--blue);
color:#fff;
text-decoration:none;
font-weight:900;
letter-spacing:2px;
}

.discount-box{
max-width:520px;
margin:0 auto 55px;
padding:25px;
background:#080808;
border:1px solid rgba(255,255,255,.08);
}

.discount-title{
font-size:13px;
font-weight:900;
letter-spacing:3px;
margin-bottom:16px;
text-transform:uppercase;
}

.discount-box input{
width:100%;
padding:14px;
background:#111;
border:1px solid rgba(255,255,255,.08);
color:#fff;
text-align:center;
outline:none;
margin-bottom:12px;
}

.discount-box button{
width:100%;
padding:14px;
border:none;
background:var(--red);
color:#fff;
font-weight:900;
letter-spacing:2px;
cursor:pointer;
}

#discountResult{
display:none;
margin-top:15px;
padding:18px;
background:#111;
border:1px solid rgba(255,255,255,.08);
}

.old-price{
text-decoration:line-through;
opacity:.5;
}

.new-price{
font-size:32px;
font-weight:900;
color:lime;
margin-top:8px;
}

.rules{
font-size:11px;
letter-spacing:2px;
opacity:.7;
margin-top:8px;
}

.syna-grid{
width:min(1500px,95%);
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:14px;
padding-bottom:80px;
}

.product-card{
overflow:hidden;
background:#0b0b0b;
}

.product-card img{
width:100%;
display:block;
transition:.4s;
}

.product-card img:hover{
transform:scale(1.05);
}

footer{
padding:70px 20px;
opacity:.35;
letter-spacing:5px;
font-weight:900;
}

@media(max-width:768px){
.logo{
font-size:4rem;
letter-spacing:4px;
}

.price-box h1{
font-size:2.2rem;
}
}
</style>
</head>

<body>

<div class="live-alert">SYNA WORLD PORTAL // ENCRYPTED ACCESS // 2026</div>

<nav>
<div class="logo">SY<span>NA</span></div>
<p class="tagline">LIMITED STREETWEAR DROP</p>
</nav>

<header>

<div class="price-box">
<h1>K750 FLAT RATE</h1>
<p>TRACKSUIT DROP // ALL SIZES</p>
</div>

<br>

<a href="https://wa.me/qr/JHU7JLO4QDFBD1" class="btn">SECURE ORDER</a>

</header>

<div class="discount-box">

<div class="discount-title">ENTER DISCOUNT CODE</div>

<input type="text" id="code" placeholder="ENTER CODE">

<button onclick="applyDiscount()">APPLY CODE</button>

<div id="discountResult">
<div class="old-price">Original Price: K750</div>
<div class="new-price">Discount Price: K675</div>
<div class="rules">DISCOUNT RULES: 10% OFF APPLIED</div>
</div>

</div>

<div class="syna-grid">
<div class="product-card"><img src="track1.jpg"></div>
<div class="product-card"><img src="track3.jpg"></div>
<div class="product-card"><img src="tracks2.jpg"></div>
<div class="product-card"><img src="trackss5.jpg"></div>
<div class="product-card"><img src="tracks6.jpg"></div>
<div class="product-card"><img src="up1.jpg"></div>
<div class="product-card"><img src="up2.jpg"></div>
<div class="product-card"><img src="ups3.jpg"></div>
</div>

<footer>
SYNA WORLD // NO RETREAT NO SURRENDER
</footer>

<script>
function applyDiscount(){

let code = document.getElementById("code").value.trim().toUpperCase();

let validCodes = ["PLANET10","FIRST10","DROP10","TRACK10","VIP10"];

let usedCodes = JSON.parse(localStorage.getItem("usedCodesSyna")) || [];

if(validCodes.includes(code)){

if(usedCodes.includes(code)){
alert("This discount code has already been used.");
return;
}

document.getElementById("discountResult").style.display = "block";

usedCodes.push(code);
localStorage.setItem("usedCodesSyna", JSON.stringify(usedCodes));

}else{
alert("Invalid Discount Code");
}

}
</script>

</body>
</html>
