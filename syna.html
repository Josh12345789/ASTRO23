<style>
:root{
    --blue:#0033ff;
    --red:#ff0044;
    --white:#f5f5f0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:var(--white);
    font-family:'Inter',sans-serif;
    text-align:center;
    overflow-x:hidden;
    position:relative;
}

/* animated background */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,51,255,.18), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255,0,68,.14), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,.05), transparent 30%);
    animation:bgMove 10s infinite alternate linear;
    z-index:-3;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size:35px 35px;
    animation:gridMove 16s linear infinite;
    z-index:-2;
}

/* stars */
.stars span{
    position:fixed;
    width:3px;
    height:3px;
    background:#fff;
    border-radius:50%;
    opacity:.4;
    animation:stars 8s linear infinite;
}

/* top bar */
.live-alert{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:14px;
    background:var(--blue);
    font-weight:900;
    letter-spacing:2px;
    font-size:.8rem;
    z-index:99;
}

/* logo text */
nav{
    padding:140px 20px 60px;
}

.logo{
    font-family:'Orbitron',sans-serif;
    font-size:7rem;
    font-weight:900;
    letter-spacing:8px;
    text-transform:uppercase;
    color:#fff;

    text-shadow:
        0 0 10px rgba(255,255,255,.8),
        0 0 25px rgba(0,51,255,.8),
        0 0 45px rgba(255,0,68,.5);

    animation:
        pulseGlow 3s infinite alternate,
        glitch 4s infinite;
}

.logo span{
    color:var(--red);
}

/* subtitle */
.tagline{
    margin-top:10px;
    opacity:.7;
    letter-spacing:4px;
    font-weight:900;
    animation:fadeUp 1.2s ease;
}

/* price box */
.price-box{
    display:inline-block;
    margin-top:55px;
    padding:24px 42px;
    border:2px solid var(--red);
    background:rgba(255,0,68,.08);
    box-shadow:0 0 25px rgba(255,0,68,.2);
    animation:floatBox 3s ease-in-out infinite;
}

.price-box h1{
    font-size:3rem;
    color:var(--red);
    font-weight:900;
}

.price-box p{
    margin-top:10px;
    letter-spacing:2px;
    font-weight:900;
}

/* button */
.btn{
    display:inline-block;
    margin:45px 0 70px;
    padding:22px 60px;
    background:var(--blue);
    color:#fff;
    text-decoration:none;
    font-weight:900;
    letter-spacing:2px;
    box-shadow:0 0 25px rgba(0,51,255,.5);
    transition:.3s;
    animation:bounceBtn 2.5s infinite;
}

.btn:hover{
    transform:scale(1.08);
}

/* grid */
.syna-grid{
    width:min(1500px,95%);
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:14px;
    padding-bottom:80px;
}

.product-card{
    overflow:hidden;
    background:#0b0b0b;
    position:relative;
    animation:fadeUp 1s ease forwards;
}

.product-card img{
    width:100%;
    display:block;
    transition:.5s;
}

.product-card:hover img{
    transform:scale(1.07);
    filter:brightness(1.15);
}

.product-card::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        transparent,
        rgba(0,51,255,.12),
        transparent
    );
    transform:translateY(-100%);
    transition:.5s;
}

.product-card:hover::after{
    transform:translateY(100%);
}

footer{
    padding:80px 20px;
    opacity:.35;
    letter-spacing:5px;
    font-weight:900;
}

/* animations */
@keyframes pulseGlow{
    from{transform:scale(1);}
    to{transform:scale(1.03);}
}

@keyframes glitch{
    0%,100%{transform:translate(0);}
    20%{transform:translate(-2px,2px);}
    40%{transform:translate(2px,-2px);}
    60%{transform:translate(-1px,1px);}
}

@keyframes bgMove{
    from{transform:translate(0,0);}
    to{transform:translate(-40px,-20px);}
}

@keyframes gridMove{
    from{transform:translateY(0);}
    to{transform:translateY(35px);}
}

@keyframes bounceBtn{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

@keyframes floatBox{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(25px);}
    to{opacity:1;transform:translateY(0);}
}

@keyframes stars{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

@media(max-width:768px){
    .logo{
        font-size:4rem;
        letter-spacing:4px;
    }

    .price-box h1{
        font-size:2.2rem;
    }

    .btn{
        padding:18px 40px;
    }
}
</style>
</head>
