<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNA WORLD | HYPER-DROP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#000;
    --blue:#0033ff;
    --red:#ff0044;
    --white:#f5f5f0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:var(--white);
    font-family:'Inter',sans-serif;
    text-align:center;
    overflow-x:hidden;
    position:relative;
}

/* animated background */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,51,255,.18), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255,0,68,.14), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,.04), transparent 30%);
    animation:bgMove 10s infinite alternate linear;
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size:40px 40px;
    animation:gridMove 18s linear infinite;
    z-index:-1;
}

/* top bar */
.live-alert{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:14px;
    background:var(--blue);
    font-family:'Archivo Black',sans-serif;
    letter-spacing:2px;
    font-size:.8rem;
    z-index:99;
}

/* nav */
nav{
    padding:150px 20px 70px;
    display:flex;
    justify-content:center;
}

/* logo circle */
.logo-circle{
    width:260px;
    height:260px;
    border-radius:50%;
    background:#000;
    border:2px solid rgba(255,255,255,.08);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    box-shadow:
        0 0 35px rgba(0,51,255,.45),
        0 0 70px rgba(255,0,68,.10);
    animation:pulse 4s infinite alternate;
}

.logo-circle::before{
    content:"";
    position:absolute;
    inset:-8px;
    border-radius:50%;
    border:2px solid rgba(0,51,255,.25);
    animation:spin 8s linear infinite;
}

/* IMPORTANT FIX:
   NO FILTERS = original image colors stay */
.logo-img{
    position:relative;
    z-index:3;
    width:115%;
    height:115%;
    object-fit:contain;

    /* removed white filter completely */
    filter:none;

    transform:scale(1.15);
}

/* price box */
.price-box{
    display:inline-block;
    padding:24px 42px;
    border:2px solid var(--red);
    background:rgba(255,0,68,.08);
    animation:glitch 3s infinite;
}

.price-box h1{
    font-family:'Archivo Black',sans-serif;
    font-size:3rem;
    color:var(--red);
}

.price-box p{
    margin-top:10px;
    letter-spacing:2px;
    font-weight:900;
}

.sub{
    margin-top:22px;
    opacity:.65;
    font-weight:900;
    letter-spacing:2px;
    text-transform:uppercase;
}

/* button */
.btn{
    display:inline-block;
    margin:45px 0 60px;
    padding:22px 60px;
    background:var(--blue);
    color:#fff;
    text-decoration:none;
    font-family:'Archivo Black',sans-serif;
    box-shadow:0 0 20px rgba(0,51,255,.45);
    animation:floatBtn 3s infinite ease-in-out;
}

/* products */
.syna-grid{
    width:min(1500px,95%);
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:14px;
    padding-bottom:80px;
}

.product-card{
    overflow:hidden;
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,.04);
}

.product-card img{
    width:100%;
    display:block;
    transition:.5s;
}

.product-card:hover img{
    transform:scale(1.05);
    filter:brightness(1.12);
}

footer{
    padding:80px 20px;
    opacity:.35;
    letter-spacing:5px;
    font-weight:900;
}

/* animations */
@keyframes pulse{
    from{transform:scale(1);}
    to{transform:scale(1.05);}
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes bgMove{
    from{transform:translate(0,0);}
    to{transform:translate(-40px,-25px);}
}

@keyframes gridMove{
    from{transform:translateY(0);}
    to{transform:translateY(40px);}
}

@keyframes glitch{
    0%,100%{transform:translate(0);}
    20%{transform:translate(-2px,2px);}
    40%{transform:translate(2px,-2px);}
    60%{transform:translate(-2px,-1px);}
}

@keyframes floatBtn{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

@media(max-width:768px){
    nav{padding-top:130px;}

    .logo-circle{
        width:190px;
        height:190px;
    }

    .price-box h1{
        font-size:2.2rem;
    }
}
</style>
</head>

<body>

<div class="live-alert">SYNA WORLD PORTAL // ENCRYPTED ACCESS // 2026</div>

<nav>
    <div class="logo-circle">
        <img src="synalogo.jpg" class="logo-img" alt="SYNA LOGO">
    </div>
</nav>

<header>
    <div class="price-box">
        <h1>K750 FLAT RATE</h1>
        <p>TRACKSUIT DROP // ALL SIZES</p>
    </div>

    <p class="sub">Limited Drop. Secure yours before the link expires.</p>

    <a href="https://wa.me/qr/JHU7JLO4QDFBD1" class="btn">SECURE ORDER</a>
</header>

<div class="syna-grid">
    <div class="product-card"><img src="track1.jpg"></div>
    <div class="product-card"><img src="track3.jpg"></div>
    <div class="product-card"><img src="tracks2.jpg"></div>
    <div class="product-card"><img src="trackss5.jpg"></div>
    <div class="product-card"><img src="tracks6.jpg"></div>
    <div class="product-card"><img src="up1.jpg"></div>
    <div class="product-card"><img src="up2.jpg"></div>
    <div class="product-card"><img src="ups3.jpg"></div>
</div>

<footer>
SYNA WORLD // NO RETREAT NO SURRENDER
</footer>

</body>
</html>
