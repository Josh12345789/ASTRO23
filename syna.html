<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNA WORLD | HYPER-DROP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-black: #000000;
            --card-black: #0a0a0a; 
            --syna-off-white: #f5f5f0;
            --syna-blue: #0033ff; 
            --syna-accent: #ff0044; 
        }

        body {
            background-color: var(--bg-black);
            background-image: 
                radial-gradient(circle at center, rgba(138, 43, 226, 0.15), transparent 60%),
                url('https://images.unsplash.com/photo-1506318137071-a8e063b4cadc?q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--syna-off-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
        }

        .live-alert {
            background-color: var(--syna-blue);
            color: white;
            padding: 12px;
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 200;
            animation: slideDown 0.8s ease;
        }

        nav {
            padding: 160px 20px 80px 20px;
            display: flex;
            justify-content: center;
        }

        /* --- THE LOGO CONTAINER --- */
        .logo-circle {
            height: 220px;
            width: 220px;
            border-radius: 50%;
            border: 2px solid var(--syna-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(0, 51, 255, 0.5);
            animation: logoPulse 4s infinite alternate ease-in-out;
            overflow: hidden;
            background: #000; /* Solid black background if image fails */
        }

        .logo-img {
            width: 100%; /* Changed to 100% to ensure it shows up */
            height: 100%;
            object-fit: cover; /* Ensures the logo fills the circle */
            display: block;
        }

        .price-announcement {
            background: rgba(255, 0, 68, 0.1);
            border: 2px solid var(--syna-accent);
            display: inline-block;
            padding: 20px 40px;
            margin-bottom: 25px;
            animation: glitch 3s infinite;
        }

        .alert-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 2.8rem;
            color: var(--syna-accent);
            letter-spacing: -2px;
            margin: 0;
        }

        .syna-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2px;
            max-width: 1500px;
            margin: 0 auto;
            padding: 20px;
        }

        .product-card {
            background-color: var(--card-black);
            overflow: hidden;
        }

        .product-card img {
            width: 100%;
            transition: 0.5s;
        }

        .product-card:hover img { transform: scale(1.05); }

        .btn-whatsapp {
            display: inline-block;
            background-color: var(--syna-blue);
            color: white;
            text-decoration: none;
            font-family: 'Archivo Black', sans-serif;
            padding: 25px 70px;
            font-size: 1.3rem;
            text-transform: uppercase;
            margin: 70px 0;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); box-shadow: 0 0 50px rgba(0, 51, 255, 0.8); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

        @media (max-width: 768px) {
            .logo-circle { height: 160px; width: 160px; }
            nav { padding: 120px 10px 40px 10px; }
            .syna-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="live-alert">SYNA WORLD PORTAL // ENCRYPTED ACCESS // 2026</div>

    <nav>
        <div class="logo-circle">
            <img src="synalogo.jpg" class="logo-img" alt="SYNA LOGO">
        </div>
    </nav>

    <header>
        <div class="price-announcement">
            <p class="alert-title">K750 FLAT RATE</p>
            <p style="font-family: 'Archivo Black'; margin-top: 10px; letter-spacing: 2px;">TRACKSUIT DROP // ALL SIZES</p>
        </div>
        <p style="opacity: 0.6; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; margin-top: 20px;">Limited Drop. Secure yours before the link expires.</p>
        <a href="https://wa.me/qr/JHU7JLO4QDFBD1" class="btn-whatsapp">Secure Order</a>
    </header>

    <div class="syna-grid">
        <div class="product-card"><img src="track1.jpg"></div>
        <div class="product-card"><img src="track3.jpg"></div>
        <div class="product-card"><img src="tracks2.jpg"></div>
        <div class="product-card"><img src="trackss5.jpg"></div>
        <div class="product-card"><img src="tracks6.jpg"></div>
        <div class="product-card"><img src="up1.jpg"></div>
        <div class="product-card"><img src="up2.jpg"></div>
        <div class="product-card"><img src="ups3.jpg"></div>
    </div>

    <footer style="padding: 100px 20px; opacity: 0.3; letter-spacing: 5px; font-weight: 900;">
        SYNA WORLD // NO RETREAT NO SURRENDER
    </footer>

</body>
</html>
